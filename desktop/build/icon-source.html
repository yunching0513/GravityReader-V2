<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&family=EB+Garamond:ital,wght@1,500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 1024px; overflow: hidden; }
  .tile {
    width: 1024px; height: 1024px;
    background: #EAE8E2;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Serif TC', serif;
  }
  /* concrete grain */
  .tile::before {
    content: ''; position: absolute; inset: 0; opacity: 0.28;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.0' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.30 0 0 0 0 0.30 0 0 0 0 0.29 0 0 0 0.12 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  /* hairline inner frame */
  .frame { position: absolute; inset: 96px; border: 2px solid #BBB8AE; }
  /* vermilion seal */
  .seal {
    position: relative; z-index: 2;
    width: 460px; height: 560px;
    background: #C15F3C;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 24px 80px rgba(31,29,25,0.22);
  }
  .seal span {
    font-size: 300px; font-weight: 700; color: #F1EFE9; line-height: 1;
    writing-mode: vertical-rl; letter-spacing: 0.1em;
  }
  .gr {
    position: absolute; z-index: 2; bottom: 150px; left: 0; right: 0; text-align: center;
    font-family: 'EB Garamond', serif; font-style: italic; font-weight: 500;
    font-size: 64px; color: #1F1D19; letter-spacing: 0.04em;
  }
  .tag {
    position: absolute; z-index: 2; top: 150px; left: 0; right: 0; text-align: center;
    font-family: 'EB Garamond', serif; font-style: italic; font-weight: 500;
    font-size: 40px; color: #C15F3C; letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="tile">
    <div class="frame"></div>
    <div class="tag">bilingual close-reading</div>
    <div class="seal"><span>昀氏</span></div>
    <div class="gr">Yun's Reader</div>
  </div>
</body>
</html>
